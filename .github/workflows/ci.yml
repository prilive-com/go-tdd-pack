# GitHub Actions equivalent of .gitlab-ci.yml.
# Use this OR .gitlab-ci.yml — delete whichever you don't need.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -d .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: go test
        run: go test ./...
      - name: go test -race
        run: go test -race -count=1 ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: deadcode
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          deadcode ./... | tee deadcode.txt
          test ! -s deadcode.txt
      - name: allowed-modules
        run: bash scripts/check-allowed-modules.sh
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  tdd-ceremony:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TDD ceremony check
        run: bash scripts/check-tdd-ceremony.sh
