# CI for the Prilive Go TDD Pack itself.
#
# The pack ships shell scripts, JSON schemas, prompts, and markdown — NOT Go
# source. Adopter projects have their own Go code; this CI tests the PACK.
#
# Two jobs:
#   - test: structural smoke tests (no Codex calls, deterministic, fast)
#   - lint: shell syntax + JSON validity + governance files present
#
# These job names map 1:1 to required_status_checks in the
# `balanced-solo-maintainer` ruleset. CodeQL runs as a separate workflow
# (created by GitHub's CodeQL default setup). DCO runs as a GitHub App check.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Phase 2 unit smoke (orchestration, no Codex)
        run: bash test/smoke-v2-phase2.sh

      - name: Tool grounding fixture smoke
        run: bash test/smoke-tool-grounding.sh

      - name: Escalation-blocks-new-cycle smoke
        run: bash test/smoke-escalation-blocks-new-cycle.sh

      - name: Config enforcement smoke
        run: bash test/smoke-config-enforcement.sh

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck + jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck jq

      - name: Bash syntax check
        run: |
          set -e
          FAIL=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "BAD SHELL: $f"
              FAIL=1
            fi
          done < <(find hooks runner test scripts -type f -name '*.sh' 2>/dev/null)
          exit $FAIL

      - name: JSON validity
        run: |
          set -e
          FAIL=0
          while IFS= read -r f; do
            if ! jq empty "$f" 2>/dev/null; then
              echo "BAD JSON: $f"
              FAIL=1
            fi
          done < <(find . -type f -name '*.json' \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './.tdd/*' 2>/dev/null)
          exit $FAIL

      - name: shellcheck (BLOCKING, severity=warning)
        # Was advisory in v2.0; blocking as of v2.0.1 — codebase is clean
        # at warning level (verified via task #102). See .shellcheckrc for
        # policy + known exceptions. To tighten further in a future release,
        # change -S warning to -S info (info-level findings currently exist
        # but were out of scope for the v2.0.1 baseline pass).
        run: |
          set -e
          shellcheck -S warning \
            hooks/*.sh \
            runner/*.sh \
            test/*.sh \
            scripts/github-setup/*.sh \
            scripts/github-setup/lib/*.sh

      - name: Operating rules + governance files present
        run: |
          set -e
          for f in CLAUDE.md AGENTS.md README.md LICENSE \
                   SECURITY.md CONTRIBUTING.md CODE_OF_CONDUCT.md \
                   CODEOWNERS CHANGELOG.md .github/dependabot.yml; do
            if [ ! -s "$f" ]; then
              echo "MISSING OR EMPTY: $f"
              exit 1
            fi
          done

      - name: Hook+runner script executable bits
        run: |
          set -e
          FAIL=0
          while IFS= read -r f; do
            if [ ! -x "$f" ]; then
              echo "NOT EXECUTABLE: $f"
              FAIL=1
            fi
          done < <(find hooks runner test -type f -name '*.sh' 2>/dev/null)
          exit $FAIL
