# Prilive Go TDD Pack v2.0 — default configuration
#
# Copied into adopter projects on install. Edit to suit. Defaults are tuned
# for "smartest available Codex, full access except no project writes".

[review]
# Maximum debate rounds before escalating to the user.
# Min 1, max 8. Default 4 — covers the typical 1-3 convergence range
# with one extra round for harder cases. The runner stops early on
# `approve`; reaching this cap without convergence triggers
# escalation (A/B/V). Lowered from 5 to 4 in sub-piece #5; adopters
# seeing noisy reviews can drop to 2 or 3.
max_rounds = 4

# Wait this long after the last edit before firing review (milliseconds).
# Coalesces bursty edits into one cycle.
coalesce_ms = 5000

# Also fire the runner when the Stop hook sees the working tree changed
# since the last review. Belt-and-suspenders for PostToolUse not firing.
stop_hook_fingerprint = true

# Hard cap on Codex calls per cycle. Prevents runaway loops.
max_codex_calls_per_cycle = 8

# Hard cap on cycle wall time (minutes). xhigh reasoning is slow.
max_cycle_minutes = 30

# FDTDD Stage 1 mode hierarchy. Drives Gate 1 (Red required for Tier-1
# prod fix) and Gate 3 (test-lock during Green). Consumed by
# hooks/inject-findings.sh today; Gate 1 + Gate 3 wire in slice 2 +
# slice 4 of the v2.3 Stage 1 rollout.
#
#   off          → both gates disabled. inject-findings rail also off.
#   soft         → both gates allow; inject-findings emits soft
#                  guidance text only. SHIPPED DEFAULT through v2.3
#                  slice 2 (gate ready-but-not-active).
#   governed_tdd → gates emit ask prompts; operator decides per-edit.
#                  Slice 3 activates Gate 1 in this mode.
#   strict_tdd   → gates emit hard denies; bypass requires
#                  /finding-accept-red or /finding-restart-red.
#                  Slice 5 activates Gate 3 in this mode.
#
# Default soft so existing v2.1 / v2.2 adopters do not see new
# gating until they explicitly opt in. Bump to governed_tdd or
# strict_tdd in your project's tdd-pack.toml override once your
# .tdd/tiers.toml is set up and the team is ready to enforce.
mode = "soft"

[codex]
# Model selection.
#
# DEFAULT: model = "auto" — runner reads ~/.codex/models_cache.json
# at session start and picks the highest-priority "list"-visible model
# the account can reach. Falls back to gpt-5.5 with a stderr warning
# if the cache is missing / corrupt / has no candidates. Implemented
# by runner/lib/resolve-model.sh (v2.3 task #138 slices 1+2).
#
# Why "auto" is the shipped default (slice 4 flip):
# - The pack itself dogfoods this knob on its own dev cycles. The
#   maintainer is adopter #1.
# - Adopters who freshly copy this file get latest-frontier behavior
#   without having to bump a pinned slug on each Codex CLI release.
# - Failure mode is bounded: cache missing → auth-aware fallback (see
#   below). Same v2.1.1 safety net for subscription accounts.
#
# Fallback path (v2.3.1 fix — auth-aware):
#   The resolver detects auth mode via the CODEX_API_KEY /
#   OPENAI_API_KEY env vars (set → "api_key"; unset → "subscription").
#   When cache is missing / corrupt / has no candidates, the
#   fallback slug is auth-aware:
#     subscription → "gpt-5.5"      (frontier model, ChatGPT-auth)
#     api_key      → "gpt-5.2-codex" (per OpenAI's June-2026
#                                     model lineup — gpt-5.5 is
#                                     subscription-auth-only and
#                                     would return HTTP 400 under
#                                     api_key auth).
#
# This auth-aware split was added in v2.3.1 after the devopspoint
# review-engine team surfaced empirically that gpt-5.5 is not
# API-key-reachable. Pre-v2.3.1 the fallback hardcoded gpt-5.5 for
# both auth modes — an unfixed latent v2.1.1-class bug for the
# api_key fallback path.
#
# TO PIN A SPECIFIC MODEL: set model = "<id>" (e.g. "gpt-5.5",
# "gpt-5.2-codex", "gpt-5.5-codex"). Use this for reproducibility
# across sessions or when validating a specific model. Confirm
# your account has access first.
#
# TO DEFER TO CODEX CLI'S DEFAULT (v2.1.x semantics): set model = "".
# DOCUMENTED UNSAFE — v2.1.1 incident: Codex CLI 0.130 silently
# shifted the default to a paid-only model and every fresh
# subscription adopter hit HTTP 400 on their first cycle. Re-verify
# after every Codex CLI upgrade if you choose this path.
#
# Resolver fallback override:
#   PRILIVE_MODEL_FALLBACK=<slug> env var ALWAYS wins (both auth
#   modes), letting operators pin the fallback explicitly. Useful
#   for environments that cache the slug + want determinism.
model = "auto"

# Reasoning effort: low | medium | high | xhigh
# Quality-tuned default "xhigh" — maximum reasoning supported by ChatGPT
# Plus/Pro/Team auth. Catches subtler bugs and races than "high". If you
# are on API-key auth (not ChatGPT subscription) and get an error, fall
# back to "high".
reasoning_effort = "xhigh"

# Live web search. "live" enables --search; "disabled" omits the flag.
# Use "disabled" only if your environment forbids outbound traffic.
web_search = "live"

# NOTE: No sandbox setting here. The runner always passes
# --sandbox danger-full-access --ask-for-approval never to give Codex the
# same access Claude has. The "no project writes" rule is enforced in the
# system prompt at prompts/codex-system.md (see also smoke test
# test/smoke-codex-respects-no-write-rule.sh).

[tdd]
# How TDD discipline is enforced.
# "criterion" = Codex flags missing tests as findings (default; non-blocking)
# "off"       = TDD is not checked at all
enforce_as = "criterion"

[severity]
# Minimum severity to surface to Claude.
# blocker | major | minor | nit
# Quality-tuned default "nit" — show Claude every finding Codex generates,
# even style/clarity nits. Lets Claude decide what to act on instead of
# silently dropping signal.
min_surface = "nit"

# Severity at which a finding becomes a "must address" — the cycle cannot
# converge if Codex returns a finding at this level or above.
must_address = "major"

# v2.1 rail (spec §5.2): confidence is the SECOND axis after severity.
# A finding only drives must-address when severity ≥ must_address AND
# confidence ≥ confidence_floor. Findings below the floor remain visible
# (routed to a "Speculative (low confidence)" section in inject-findings)
# but do not block.
#
# Confidence scale (anchored in the reviewer prompt):
#   5 = verified by tool output / repro / official docs
#   4 = strong static evidence, not runtime-verified
#   3 = likely; pattern recognition + partial reading
#   2 = plausible; not fully verified
#   1 = guess; speculative
#
# Default 4 — Codex self-rates as 4 only when it has read the
# surrounding code and the path is clear. Adopters seeing too many
# false positives can raise to 5 (verified only); adopters wanting more
# signal can drop to 3.
confidence_floor = 4

[gate]
# OPT-IN shell git hooks. Default false (no blocking).
# Set true to install pre-commit / pre-push hooks that block git commit/push
# until the latest review cycle has converged.
git_pre_commit = false
git_pre_push = false

[audit]
debates_jsonl = ".tdd/reviews/debates.jsonl"
keep_transcripts = true

[disable]
# Single emergency switch. If PRILIVE_REVIEW_DISABLE=1 in the environment,
# the entire pack becomes a no-op. Use only as kill switch, not daily.
env_var = "PRILIVE_REVIEW_DISABLE"

[pre_review]
# Pre-write gating (task #109). When `enabled = true`, every Write, Edit,
# MultiEdit, NotebookEdit, and Bash action Claude Code takes is reviewed
# by Codex BEFORE it runs. Reviewer decides allow / deny / ask; deny
# blocks the action.
#
# Off by default so adopters who upgrade to this version see no behavior
# change. To turn it on for your project: set `enabled = true` here and
# commit the change. To temporarily bypass, `export PRILIVE_REVIEW_DISABLE=1`.
#
# Power-user env override: PRILIVE_PRE_REVIEW_EXPERIMENTAL=1 forces the
# gate on for this shell regardless of config. Useful when you want to
# experiment in one terminal without committing a config change.
#
# Activation precedence (highest first):
#   1. PRILIVE_REVIEW_DISABLE=1       → gate OFF (kill switch)
#   2. PRILIVE_PRE_REVIEW_EXPERIMENTAL=1 → gate ON (env override)
#   3. pre_review.enabled in this file → persistent project default
#   4. Otherwise → OFF
enabled = false

[ops_triage]
# Ops risk triage (v2.2 slice 1: deterministic parser + observe-mode logging).
# See docs/PROPOSAL-ops-risk-triage.md for the full three-layer design.
#
# Slice 1 status: SHIPPED. Layer 1 deterministic parser + Layer 1b
# user-owned catastrophic denylist + observe-mode JSONL logging to
# .tdd/ops-triage/observe.log. NEVER interrupts: the hook silently
# allows everything in slice 1; the log is the entire deliverable.
# Adopters review the log to see what their workload looks like, then
# advance to slices 2-3 when the gate becomes useful.
#
# Slice 2-6 status: NOT YET SHIPPED. Layer 2 Haiku classifier + caching
# + ask mode + Codex deep review + governed mode + session-tags
# escalation. mode=ask and mode=governed currently degrade to observe
# with a warning log entry (no actual gate yet).
#
# To enable observe-mode logging:
#   1. Copy config/ops-safe-allowlist.txt.example to
#      config/ops-safe-allowlist.txt and edit.
#   2. Copy config/ops-catastrophic-denylist.txt.example to
#      config/ops-catastrophic-denylist.txt and edit.
#   3. Set enabled = true below and run normally for a week.
#   4. Review .tdd/ops-triage/observe.log; tune the two configs based
#      on what you see.
#
# Activation precedence (highest first):
#   1. PRILIVE_REVIEW_DISABLE=1  → hook OFF (kill switch, applies to all)
#   2. PRILIVE_OPS_TRIAGE=1      → triage ON for this shell (env override)
#   3. ops_triage.enabled in this file → persistent project default
#   4. Otherwise → OFF
enabled = false

# Slice 3 SHIPPED. mode default = "ask" — the soft middle layer is live.
# Modes:
#   off       — gate disabled (pack as before v2.2).
#   observe   — Layer 1+2 classify and log, but NEVER interrupt.
#               Use this when you want a week of classification data
#               from your real workload before turning on the gate.
#   ask       — DEFAULT. Layer 1+2 active. Escalation-worthy commands
#               prompt the operator with the classifier's reason
#               (file fallback at .tdd/ops-triage/pending-reason.txt
#               handles #55889 closed-not-planned UI rendering).
#   governed  — Layer 1+2 active. Additionally: destructive verdicts
#               HARD-DENY. Slice 5 will add an artifact-based override.
#               Use governed for unattended/CI sessions or repos where
#               an R3 mistake is unrecoverable.
mode = "ask"  # off | observe | ask | governed
