# GitLab CI — DISABLED 2026-05-19
#
# Reason: this pipeline was v1.x ceremony (Go-source assumptions, references
# to scripts/tdd-test-hooks.sh, check-tdd-ceremony.sh, etc.) and the pack is
# v2.0 shell. Pipelines also had no runner tags, so they sat pending.
#
# The workflow rule below skips all pipelines for every event. The job
# definitions are preserved as commented blocks at the bottom so they can
# be re-enabled (and rewritten for v2.0) without re-typing.
#
# To re-enable:
#   1. Remove the `workflow:` block (lines below).
#   2. Uncomment the job blocks you want.
#   3. Rewrite each for v2.0 (shell smoke + lint, no Go assumptions) —
#      see .github/workflows/ci.yml for the v2.0 equivalent.
#   4. Add `tags: [...]` to each job matching your GitLab runner config.

workflow:
  rules:
    - when: never

